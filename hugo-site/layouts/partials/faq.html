<!-- FAQ accordion with JSON-LD structured data -->
{{ if .Params.faqs }}
<div class="faq-list">
  {{ range .Params.faqs }}
  <details class="faq-item">
    <summary class="faq-question">{{ .question }}</summary>
    <div class="faq-answer">
      <p>{{ .answer }}</p>
    </div>
  </details>
  {{ end }}
</div>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {{ range $i, $faq := .Params.faqs }}
    {{ if $i }},{{ end }}
    {
      "@type": "Question",
      "name": "{{ $faq.question }}",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "{{ $faq.answer }}"
      }
    }
    {{ end }}
  ]
}
</script>
{{ end }}
